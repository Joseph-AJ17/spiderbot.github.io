<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SpiderBot Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --spidey-blue: #001f3f;
            --spidey-red: #8b0000;
            --glass: rgba(255, 255, 255, 0.1);
            /* Variable dinámica para el alto real en móviles */
            --vh: 1vh;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            margin: 0;
            padding: 0;
            /* Usamos la variable --vh para el alto exacto */
            height: calc(var(--vh, 1vh) * 100);
            width: 100vw;
            overflow: hidden;
            font-family: sans-serif;
            background: linear-gradient(135deg, var(--spidey-blue), var(--spidey-red));
            color: white;
        }

        /* Botón Conectar - Flotante arriba */
        #connect-btn {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 8px 15px;
            border-radius: 20px;
            background: #28a745;
            border: 2px solid white;
            color: white;
            font-weight: bold;
            font-size: 12px;
        }

        #app-container {
            display: grid;
            grid-template-columns: 120px 1fr 120px;
            grid-template-rows: 60px 1fr 60px;
            height: 100%;
            width: 100%;
            padding: 10px 20px;
            gap: 10px;
        }

        /* Cámara - Capa inferior */
        #camera-view {
            grid-column: 1 / 4;
            grid-row: 1 / 4;
            border: 2px solid #ff9800;
            background: #000;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            margin: 5px;
        }

        /* Paneles laterales - Estilo Glass */
        .panel {
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .panel-left { grid-column: 1; grid-row: 2; }
        .panel-right { grid-column: 3; grid-row: 2; }

        /* Botones Circulares */
        .btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid white;
            background: var(--glass);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .btn:active { background: white; color: black; }

        /* Alertas de Proximidad - Pegadas a los bordes */
        .alert {
            position: absolute;
            top: 20%;
            bottom: 20%;
            width: 30px;
            border: 2px solid #007bff;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            font-size: 10px;
            font-weight: bold;
            background: rgba(0, 123, 255, 0.2);
            border-radius: 5px;
            padding: 2px;
        }
        .alert-L { left: 150px; }
        .alert-R { right: 150px; }

        /* Icono Buzzer arriba a la derecha */
        #buzzer-area {
            grid-column: 3;
            grid-row: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Mensaje de rotación forzado */
        #rotation-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        @media (orientation: portrait) {
            #rotation-overlay { display: flex; }
        }
    </style>
</head>
<body>

    <div id="rotation-overlay">
        <h1>🔄 ROTAR TELÉFONO</h1>
        <p>Para controlar el SpiderBot usa el modo horizontal.</p>
    </div>

    <button id="connect-btn" onclick="initApp()">CONECTAR</button>

    <div id="app-container">
        <div id="camera-view">CÁMARA SPIDERBOT POV</div>

        <div class="alert alert-L">PROXIMIDAD IZQ</div>
        <div class="alert alert-R">PROXIMIDAD DER</div>

        <div class="panel panel-left">
            <div class="btn" onmousedown="send('L')">←</div>
            <small>ROTAR</small>
            <div class="btn" onmousedown="send('R')">→</div>
        </div>

        <div id="buzzer-area">
            <div class="btn" style="border-color: red;" onclick="send('B')">🔔</div>
        </div>

        <div class="panel panel-right">
            <div class="btn" onmousedown="send('F')">↑</div>
            <small>MOVER</small>
            <div class="btn" onmousedown="send('B')">↓</div>
        </div>
    </div>

    <script>
        // Función para arreglar el alto en móviles
        function setDocHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        window.addEventListener('resize', setDocHeight);
        window.addEventListener('orientationchange', setDocHeight);
        setDocHeight();

        function initApp() {
            const btn = document.getElementById('connect-btn');
            btn.innerText = "CONECTADO";
            btn.style.background = "#007bff";
            
            // Forzar pantalla completa
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }

        function send(cmd) {
            console.log("Comando:", cmd);
            // Efecto visual de vibración al tocar
            if(window.navigator.vibrate) window.navigator.vibrate(50);
        }
    </script>
</body>
</html>
