<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SpiderBot Control</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --spidey-blue: #001f3f;
            --spidey-red: #8b0000;
            --glass: rgba(255, 255, 255, 0.1);
            --vh: 1vh;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
        }

        body {
            margin: 0;
            padding: 0;
            height: calc(var(--vh, 1vh) * 100);
            width: 100vw;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--spidey-blue), var(--spidey-red));
            color: white;
        }

        /* Contenedor Principal */
        #app-container {
            display: grid;
            grid-template-columns: 140px 1fr 140px;
            grid-template-rows: 70px 1fr 70px;
            height: 100%;
            width: 100%;
            padding: 15px 30px; /* Margen para evitar bordes curvos del iPhone */
            gap: 10px;
        }

        /* Vista de Cámara (XIAO ESP32-S3) */
        #camera-view {
            grid-column: 1 / 4;
            grid-row: 1 / 4;
            border: 2px solid #ff9800;
            background: #000;
            border-radius: 20px;
            z-index: 1;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #camera-view img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Botón de Conexión */
        #connect-btn {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        padding: 10px 20px;
        border-radius: 25px;
        background: #28a745; /* Verde por defecto */
        border: 2px solid white;
        color: white;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        transition: all 0.2s ease; /* Transición suave */
        }
        
        /* Efecto al presionar (hover/active) con blanco translúcido */
        #connect-btn:active, #connect-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            transform: translateX(-50%) scale(0.95);
            box-shadow: 0 2px 8px rgba(255,255,255,0.4);
        }

        /* Paneles de Control (Glassmorphism) */
        .panel {
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .panel-left { grid-column: 1; grid-row: 2; }
        .panel-right { grid-column: 3; grid-row: 2; }

        /* Botones de Acción */
        .btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 2px solid white;
            background: var(--glass);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            transition: all 0.2s;
        }

        .btn:active { 
            background: white; 
            color: black; 
            transform: scale(0.9);
        }

        /* Alertas de Proximidad (VL53L0X) */
        .alert {
            position: absolute;
            top: 25%;
            bottom: 25%;
            width: 35px;
            border: 2px solid #007bff;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            writing-mode: vertical-rl;
            font-size: 11px;
            font-weight: bold;
            border-radius: 8px;
            background: rgba(0, 123, 255, 0.1);
            transition: background 0.3s;
        }
        .alert-L { left: 200px; }
        .alert-R { right: 200px; }

        /* Buzzer Icon */
        #buzzer-area {
            grid-column: 3;
            grid-row: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* Overlay de Rotación */
        #rotation-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        @media (orientation: portrait) {
            #rotation-overlay { display: flex; }
        }
    </style>
</head>
<body>

    <div id="rotation-overlay">
        <h1>🔄 ROTAR DISPOSITIVO</h1>
        <p>Activa el modo horizontal para controlar el SpiderBot.</p>
    </div>

    <button id="connect-btn" onclick="initApp()">CONECTAR SPIDERBOT</button>

    <div id="app-container">
        <div id="camera-view">
            <img id="stream-img" src="" alt="Esperando transmisión...">
        </div>

        <div id="alert-L" class="alert alert-L">PROXIMIDAD IZQ</div>
        <div id="alert-R" class="alert alert-R">PROXIMIDAD DER</div>

        <div class="panel panel-left">
            <div class="btn" ontouchstart="send('L')" ontouchend="send('S')">←</div>
            <small>ROTAR</small>
            <div class="btn" ontouchstart="send('R')" ontouchend="send('S')">→</div>
        </div>

        <div id="buzzer-area">
            <div class="btn" style="border-color: #ff4444; font-size: 22px;" ontouchstart="send('B')" ontouchend="send('Q')">🔔</div>
        </div>

        <div class="panel panel-right">
            <div class="btn" ontouchstart="send('F')" ontouchend="send('S')">↑</div>
            <small>MOVER</small>
            <div class="btn" ontouchstart="send('BWD')" ontouchend="send('S')">↓</div>
        </div>
    </div>

    <script>
        let socket;
        // EDITAR ESTAS IPS CON LAS QUE SALGAN EN TU MONITOR SERIAL
        // Reemplaza las variables en tu script con esto:
        const IP_C6 = "172.20.10.3"; // Cerebro (Control)
        const IP_S3 = "172.20.10.2"; // Cámara (Video)

        // Ajuste de altura para móviles
        function setDocHeight() {
            document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
        }
        window.addEventListener('resize', setDocHeight);
        setDocHeight();

        function initApp() {
            // Conectar el video
            document.getElementById('stream-img').src = `http://${IP_S3}:81/stream`;

            // Conectar WebSockets a la XIAO C6
            socket = new WebSocket(`ws://${IP_C6}:81`);
            
            socket.onopen = () => {
                const btn = document.getElementById('connect-btn');
                btn.innerText = "CONECTADO";
                btn.style.background = "#007bff";
            };

            socket.onmessage = (event) => {
                const data = event.data;
                // Manejo de alertas visuales según sensores VL53L0X
                if(data === "L_CERCA") document.getElementById('alert-L').style.background = "rgba(255, 0, 0, 0.8)";
                if(data === "L_LIBRE") document.getElementById('alert-L').style.background = "rgba(0, 123, 255, 0.1)";
                if(data === "R_CERCA") document.getElementById('alert-R').style.background = "rgba(255, 0, 0, 0.8)";
                if(data === "R_LIBRE") document.getElementById('alert-R').style.background = "rgba(0, 123, 255, 0.1)";
            };

            socket.onclose = () => {
                document.getElementById('connect-btn').innerText = "RECONECTAR";
                document.getElementById('connect-btn').style.background = "#dc3545";
            };
        }

        function send(cmd) {
            if(socket && socket.readyState === WebSocket.OPEN) {
                socket.send(cmd);
            }
            // Feedback táctil (vibración corta)
            if(window.navigator.vibrate && cmd !== 'S') {
                window.navigator.vibrate(40);
            }
        }
    </script>
</body>
</html>
